{% extends "rooms/base.html" %}
{% block content %}

<style>
.auth-card {
    max-width: 420px;
    margin: auto;
    padding: 35px;
    border-radius: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    box-shadow: 0 0 25px #00000020;
}

.auth-card h2 {
    text-align: center;
    font-weight: 700;
    margin-bottom: 25px;
}

.auth-btn {
    width: 100%;
    padding: 12px;
    font-size: 1.1rem;
    border-radius: 12px;
}
</style>

<div class="auth-card mt-5">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-primary auth-btn">Login</button>

        <p class="mt-3 text-center">
            Don’t have an account? <a href="{% url 'register' %}">Register</a>
        </p>
    </form>
</div>

{% endblock %}
