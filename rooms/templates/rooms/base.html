<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get2Gather</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Light mode */
        :root {
            --bg-color: #ffffff;
            --text-color: #212529;
            --card-bg: #f8f9fa;
            --border-color: #d0d0d0;
            --chat-bg: #e9ecef;
            --chat-text: #212529;
        }

        /* Dark mode */
        .dark-mode {
            --bg-color: #121212;
            --text-color: #f1f1f1;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --chat-bg: #2b2b2b;
            --chat-text: #ffffff;
        }

        /* Apply theme colors */
        body {
            background: var(--bg-color) !important;
            color: var(--text-color) !important;

            /* 🚀 Full-width layout fix */
            width: 100vw !important;
            max-width: 100vw !important;
            overflow-x: hidden !important;
        }

        main {
    width: 100% !important;
    max-width: 100% !important;
    padding: 30px 40px !important; /* small padding only */
    margin: 0 !important;
    display: block;
    box-sizing: border-box !important;
}


        /* Card fix */
        .card {
            background-color: var(--card-bg) !important;
            color: var(--text-color) !important;
        }

        /* Fix ALL text */
        body, p, span, strong, label, h1, h2, h3, h4, h5, h6, div, small {
            color: var(--text-color) !important;
        }

        /* Fix input fields */
        input, textarea, select {
            background-color: var(--card-bg) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
        }

        input::placeholder {
            color: var(--text-color) !important;
            opacity: 0.5;
        }

    </style>

    {% block extra_head %}{% endblock %}

</head>

<body>

    <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm"
     style="background: var(--card-bg); border-bottom: 1px solid var(--border-color);">

    <div class="container-fluid px-4">

        <!-- Brand -->
            
        <a class="navbar-brand fw-bold"
           href="/"
           style="font-size: 1.4rem; color: var(--text-color) !important;">
            ▶Get2Gather
        </a>

        <!-- Hamburger -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarMenu">

            <!-- Right Side -->
            <ul class="navbar-nav ms-auto d-flex align-items-center">

                {% if user.is_authenticated %}
                    <li class="nav-item me-3">
                        <span class="text-muted small">
                            Logged in as <strong>{{ user.username }}</strong>
                        </span>
                    </li>
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-link nav-link p-0" 
            style="color:white; text-decoration:none;">
        Logout
    </button>
</form>

                    </li>
                {% else %}
                    <li class="nav-item me-2">
                        <a class="btn btn-outline-primary btn-sm" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm" href="{% url 'register' %}">
                            Register
                        </a>
                    </li>
                {% endif %}

                <!-- Theme toggle -->
                <li class="nav-item ms-3">
                    <button id="themeToggle" class="btn btn-outline-secondary btn-sm">
                        🌙
                    </button>
                </li>

            </ul>
        </div>

    </div>
</nav>


    <!-- 🚀 FULL WIDTH CONTENT AREA -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const toggleButton = document.getElementById("themeToggle");

        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            toggleButton.textContent = "Light Mode";
        }

        toggleButton.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");

            if (document.body.classList.contains("dark-mode")) {
                localStorage.setItem("theme", "dark");
                toggleButton.textContent = "Light Mode";
            } else {
                localStorage.setItem("theme", "light");
                toggleButton.textContent = "Dark Mode";
            }
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
