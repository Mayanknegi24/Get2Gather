{% extends "rooms/base.html" %}
{% block content %}

<style>
.room-card {
    max-width: 480px;
    margin: auto;
    padding: 35px;
    border-radius: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    box-shadow: 0 0 20px #00000020;
}

.room-card h2 {
    text-align: center;
    font-weight: 700;
    margin-bottom: 25px;
}
</style>

<div class="room-card mt-5">
    <h2>Create a Room</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Room Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter room name" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Create Room</button>
    </form>
</div>

{% endblock %}
